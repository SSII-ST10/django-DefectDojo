name: CI/CD Security Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  security_tests:
    name: Security Tests (SAST & SCA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python para Semgrep
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Ejecutar Semgrep (SAST)
        run: semgrep scan --config auto --json -o semgrep-report.json .
        continue-on-error: true 

      - name: Ejecutar OWASP Dependency-Check (SCA)
        uses: dependency-check/Dependency-Check_Action@main
        id: Depcheck
        with:
          project: 'django-defectdojo'
          path: '.'
          format: 'XML'
          out: 'reports'
        continue-on-error: true

      - name: Guardar reportes para envío a DefectDojo
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            semgrep-report.json
            reports/dependency-check-report.xml